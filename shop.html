<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pink Muse | Shop</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Yellowtail&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body class="shop-page">
    <header>
      <nav id="navbar">
        <div class="navbar">
          <a href="index.html" id="home-link">HOME</a>
          <a href="shop.html" id="shop-link">SHOP</a>
          <a href="about.html" id="about-link">ABOUT US</a>
          <a href="contactUs.html" id="contact-link">CONTACT US</a>

          <div class="nav-search">
            <input
              type="text"
              id="searchInput"
              placeholder="Search perfumes..."
            />
            <button><i class="fas fa-search"></i></button>
          </div>

          <div class="cart-icon" id="cartIcon">
            <i class="fas fa-shopping-cart"></i>
            <span id="cartCount">0</span>
          </div>
        </div>
      </nav>
    </header>

    <!-- ================= SHOP SECTION ================= -->

    <main>
      <section id="shop-section" class="herosection">
        <div class="hero-text" id="welcomeMessage">
          <h1>Welcome to Our Store !!</h1>
        </div>
        <!-- Products will be generated here -->
        <div id="productContainer" class="box-wrapper"></div>
      </section>
    </main>

    <div class="cart-sidebar" id="cartSidebar">
      <div class="cart-header">
        <h2>Your Cart</h2>
        <button id="closeCart">&times;</button>
      </div>
      <div id="cartItems"></div>
      <div class="cart-total" id="cartTotalSection"></div>
    </div>
    <!-- ================= FOOTER ================= -->

    <footer id="footer" class="footer">
      <div class="copyright">
        <p class="copyright-text">MADE BY MINAL | All Rights Reserved</p>
      </div>
      <div class="social_links">
        <a
          href="https://github.com/minalduggal"
          class="social_link"
          aria-label="GitHub"
        >
          <i class="fab fa-github"></i>
        </a>
        <a
          href="https://www.linkedin.com/in/minal-duggal-2809131b3"
          class="social_link"
          aria-label="LinkedIn"
        >
          <i class="fab fa-linkedin-in"></i>
        </a>

        <a
          href="https://www.instagram.com/minalduggal/profilecard/?igsh=eWtpZHZ3eDlpb29n"
          class="social_link"
          aria-label="Instagram"
        >
          <i class="fab fa-instagram"></i>
        </a>
      </div>
    </footer>
    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/whishlist.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Contact Us</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Yellowtail&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body class="contact-page">
    <nav>
      <div class="navbar-section">
        <div class="navbar">
          <a href="index.html" id="home-link">HOME</a>
          <a href="shop.html" id="shop-link">SHOP</a>
          <a href="about.html" id="about-link">ABOUT US</a>
          <a href="contactUs.html" id="contact-link">CONTACT US</a>
        </div>
      </div>
    </nav>

    <div class="herosection">
      <section class="contact-section">
        <h1>Contact Us</h1>
        <p>
          We'd love to hear from you! Reach out with any questions, suggestions,
          or feedback.
        </p>

        <form class="contact-form id="contactForm">
          <div class="form-group">
            <label for="name">Your Name</label>
            <input
              type="text"
              id="name"
              placeholder="Enter your name"
              autocomplete="name"
              required
            />
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              placeholder="Enter your email"
              autocomplete="email"
              required
            />
          </div>

          <div class="form-group">
            <label for="message">Your Message</label>
            <textarea
              id="message"
              rows="5"
              placeholder="Type your message..."
              autocomplete="off"
              required
            ></textarea>
          </div>
          <button type="submit" class="send-button">Send Message</button>
          <p id="successMessage"></p>
        </form>
      </section>
    </div>
    <footer class="footer">
      <div class="copyright">
        <p style="font-size: larger">
          MADE BY MINAL | All Rights Reserved
        </p>
      </div>
      <!-- Social links added here -->
      <div class="social_links">
        <a href="https://github.com/minalduggal" class="social_link"
          ><i class="fab fa-github"></i
        ></a>
        <a
          href="https://www.linkedin.com/in/minal-duggal-2809131b3"
          class="social_link"
          ><i class="fab fa-linkedin-in"></i
        ></a>
        <a
          href="https://www.instagram.com/minalduggal/profilecard/?igsh=eWtpZHZ3eDlpb29n"
          class="social_link"
          ><i class="fab fa-instagram"></i
        ></a>
      </div>
    </footer>
    <script src="js/contact.js"></script>
  </body>
</html>
